kind = "web"
previewPath = "/"
title = "BRAX Marketplace"
version = "1.0.0"
id = "artifacts/brax"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26118

[services.development]
run = "pnpm --filter @workspace/brax run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brax", "run", "build" ]
publicDir = "artifacts/brax/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26118"
BASE_PATH = "/"
